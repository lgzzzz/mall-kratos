syntax = "proto3";

package user.v1;

option go_package = "user-service/api/user/v1;v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// 用户服务定义
service UserService {
  // 账户相关接口
  rpc Register (RegisterRequest) returns (UserReply);
  rpc Login (LoginRequest) returns (LoginReply);
  rpc GetUserInfo (GetUserInfoRequest) returns (UserReply);
  rpc UpdateUserInfo (UpdateUserInfoRequest) returns (UserReply);

  // 地址相关接口
  rpc AddAddress (AddAddressRequest) returns (AddressReply);
  rpc UpdateAddress (UpdateAddressRequest) returns (AddressReply);
  rpc DeleteAddress (DeleteAddressRequest) returns (google.protobuf.Empty);
  rpc GetAddress (GetAddressRequest) returns (AddressReply);
  rpc ListAddresses (ListAddressesRequest) returns (ListAddressesReply);
}

// 用户基本信息
message UserReply {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  string email = 4;
  string mobile = 5;
  string avatar = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// 地址基本信息
message AddressReply {
  int64 id = 1;
  int64 user_id = 2;
  string name = 3;
  string mobile = 4;
  string province = 5;
  string city = 6;
  string district = 7;
  string detail = 8;
  bool is_default = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// ========== 账户请求消息 ==========

message RegisterRequest {
  string username = 1;
  string password = 2;
  string mobile = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginReply {
  string token = 1;
  UserReply user = 2;
}

message GetUserInfoRequest {
  int64 id = 1;
}

message UpdateUserInfoRequest {
  int64 id = 1;
  string nickname = 2;
  string email = 3;
  string avatar = 4;
}

// ========== 地址请求消息 ==========

message AddAddressRequest {
  int64 user_id = 1;
  string name = 2;
  string mobile = 3;
  string province = 4;
  string city = 5;
  string district = 6;
  string detail = 7;
  bool is_default = 8;
}

message UpdateAddressRequest {
  int64 id = 1;
  string name = 2;
  string mobile = 3;
  string province = 4;
  string city = 5;
  string district = 6;
  string detail = 7;
  bool is_default = 8;
}

message DeleteAddressRequest {
  int64 id = 1;
}

message GetAddressRequest {
  int64 id = 1;
}

message ListAddressesRequest {
  int64 user_id = 1;
}

message ListAddressesReply {
  repeated AddressReply results = 1;
}
