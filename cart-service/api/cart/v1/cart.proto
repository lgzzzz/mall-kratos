syntax = "proto3";

package cart.v1;

option go_package = "cart-service/api/cart/v1;v1";

import "google/protobuf/empty.proto";

// 购物车服务定义
service CartService {
  rpc AddCart (AddCartRequest) returns (CartReply);
  rpc UpdateCart (UpdateCartRequest) returns (CartReply);
  rpc DeleteCart (DeleteCartRequest) returns (google.protobuf.Empty);
  rpc ListCart (ListCartRequest) returns (ListCartReply);
  rpc ClearCart (ClearCartRequest) returns (google.protobuf.Empty);
}

// 购物车项信息
message CartReply {
  int64 id = 1;
  int64 user_id = 2;
  int64 product_id = 3;
  int32 quantity = 4;
  bool selected = 5;
}

message AddCartRequest {
  int64 user_id = 1;
  int64 product_id = 2;
  int32 quantity = 3;
}

message UpdateCartRequest {
  int64 id = 1;
  int32 quantity = 2;
  bool selected = 3;
}

message DeleteCartRequest {
  int64 id = 1;
}

message ListCartRequest {
  int64 user_id = 1;
}

message ListCartReply {
  repeated CartReply results = 1;
}

message ClearCartRequest {
  int64 user_id = 1;
}
