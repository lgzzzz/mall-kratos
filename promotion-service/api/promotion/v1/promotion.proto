syntax = "proto3";

package promotion.v1;

option go_package = "promotion-service/api/promotion/v1;v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// 营销服务定义
service PromotionService {
  // 优惠券相关
  rpc CreateCoupon (CreateCouponRequest) returns (CouponReply);
  rpc ListCoupons (ListCouponsRequest) returns (ListCouponsReply);
  rpc GrantCoupon (GrantCouponRequest) returns (google.protobuf.Empty); // 发放给用户
  rpc UseCoupon (UseCouponRequest) returns (google.protobuf.Empty);    // 核销
  
  // 计算优惠价格
  rpc CalculateDiscount (CalculateDiscountRequest) returns (CalculateDiscountReply);
}

message CouponReply {
  int64 id = 1;
  string name = 2;
  int32 type = 3; // 1: 满减, 2: 折扣
  int64 threshold = 4; // 门槛金额
  int64 discount = 5;  // 优惠金额或折扣比例
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
}

message CreateCouponRequest {
  string name = 1;
  int32 type = 2;
  int64 threshold = 3;
  int64 discount = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
}

message ListCouponsRequest {
  int32 page_num = 1;
  int32 page_size = 2;
}

message ListCouponsReply {
  repeated CouponReply results = 1;
  int32 total = 2;
}

message GrantCouponRequest {
  int64 coupon_id = 1;
  int64 user_id = 2;
}

message UseCouponRequest {
  int64 coupon_id = 1;
  int64 user_id = 2;
  string order_id = 3;
}

message CalculateDiscountRequest {
  int64 user_id = 1;
  int64 total_amount = 2;
  repeated int64 coupon_ids = 3;
}

message CalculateDiscountReply {
  int64 discount_amount = 1;
  int64 final_amount = 2;
}
