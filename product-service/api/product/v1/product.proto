syntax = "proto3";

package product.v1;

option go_package = "product-service/api/product/v1;v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// 商品服务定义
service ProductService {
  // 商品相关接口
  rpc CreateProduct (CreateProductRequest) returns (ProductReply);
  rpc UpdateProduct (UpdateProductRequest) returns (ProductReply);
  rpc DeleteProduct (DeleteProductRequest) returns (google.protobuf.Empty);
  rpc GetProduct (GetProductRequest) returns (ProductReply);
  rpc ListProducts (ListProductsRequest) returns (ListProductsReply);

  // 分类相关接口
  rpc CreateCategory (CreateCategoryRequest) returns (CategoryReply);
  rpc UpdateCategory (UpdateCategoryRequest) returns (CategoryReply);
  rpc DeleteCategory (DeleteCategoryRequest) returns (google.protobuf.Empty);
  rpc GetCategory (GetCategoryRequest) returns (CategoryReply);
  rpc ListCategories (ListCategoriesRequest) returns (ListCategoriesReply);
}

// 商品基本信息
message ProductReply {
  int64 id = 1;
  string name = 2;
  string description = 3;
  string content = 4;
  string image_url = 5;
  int64 category_id = 6;
  int64 price = 7; // 单位：分
  int32 status = 8; // 1: 上架, 0: 下架
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// 分类基本信息
message CategoryReply {
  int64 id = 1;
  string name = 2;
  int64 parent_id = 3;
  int32 level = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// ========== 商品请求消息 ==========

message CreateProductRequest {
  string name = 1;
  string description = 2;
  string content = 3;
  string image_url = 4;
  int64 category_id = 5;
  int64 price = 6;
}

message UpdateProductRequest {
  int64 id = 1;
  string name = 2;
  string description = 3;
  string content = 4;
  string image_url = 5;
  int64 category_id = 6;
  int64 price = 7;
  int32 status = 8;
}

message DeleteProductRequest {
  int64 id = 1;
}

message GetProductRequest {
  int64 id = 1;
}

message ListProductsRequest {
  int32 page_num = 1;
  int32 page_size = 2;
  int64 category_id = 3;
  string keyword = 4;
}

message ListProductsReply {
  repeated ProductReply results = 1;
  int32 total = 2;
}

// ========== 分类请求消息 ==========

message CreateCategoryRequest {
  string name = 1;
  int64 parent_id = 2;
}

message UpdateCategoryRequest {
  int64 id = 1;
  string name = 2;
  int64 parent_id = 3;
}

message DeleteCategoryRequest {
  int64 id = 1;
}

message GetCategoryRequest {
  int64 id = 1;
}

message ListCategoriesRequest {
  int64 parent_id = 1;
}

message ListCategoriesReply {
  repeated CategoryReply results = 1;
}
